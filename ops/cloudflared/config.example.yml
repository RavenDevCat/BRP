tunnel: YOUR_TUNNEL_ID
credentials-file: /etc/cloudflared/YOUR_TUNNEL_ID.json

ingress:
  # Stage-only test hostname. This must point at the staging frontend origin.
  - hostname: staging.example.com
    service: http://127.0.0.1:8501

  # Domestic production hostname. Do not point this at staging during preview
  # work; change it only during an explicit production promotion.
  - hostname: brp.example.com
    service: http://127.0.0.1:8500

  # React public hosts proxy same-origin /api to the backend; avoid exposing a separate backend API hostname unless a legacy integration explicitly needs it.

  # Do not expose OSRM through public tunnel hostnames. Application services
  # should call local OSRM endpoints directly; local development should use the
  # operator-provided diagnostic loopback mapping when diagnostics need OSRM.
  - service: http_status:404
