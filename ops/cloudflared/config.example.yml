tunnel: YOUR_TUNNEL_ID
credentials-file: /etc/cloudflared/YOUR_TUNNEL_ID.json

ingress:
  # Stage-only test hostname. This must point at the staging frontend origin.
  - hostname: staging.example.com
    service: http://127.0.0.1:8501

  # Domestic production hostname. Do not point this at staging during preview
  # work; change it only during an explicit production promotion.
  - hostname: brp.example.com
    service: http://127.0.0.1:8500

  # Direct backend API hostname for clients and diagnostics when intentionally
  # exposed behind access control.
  - hostname: brp-api.example.com
    service: http://127.0.0.1:8000

  - hostname: osrm-shanghai.example.com
    service: http://127.0.0.1:5002
  - hostname: osrm-beijing.example.com
    service: http://127.0.0.1:5003
  - hostname: osrm-suzhou.example.com
    service: http://127.0.0.1:5004
  - hostname: osrm-xian.example.com
    service: http://127.0.0.1:5005
  - hostname: osrm-south-korea.example.com
    service: http://127.0.0.1:5006
  - service: http_status:404
