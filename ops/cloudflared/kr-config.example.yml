tunnel: YOUR_KR_TUNNEL_ID
credentials-file: /etc/cloudflared/YOUR_KR_TUNNEL_ID.json

ingress:
  # KR public frontend. This currently serves the React static/proxy service.
  - hostname: kr-brp.example.com
    service: http://127.0.0.1:8501

  # React preview/static frontend for KR.
  # This hostname must be added in Cloudflare Zero Trust/DNS before it works.
  - hostname: kr-react-brp.example.com
    service: http://127.0.0.1:4173

  - hostname: kr-brp-api.example.com
    service: http://127.0.0.1:8001
  - service: http_status:404
